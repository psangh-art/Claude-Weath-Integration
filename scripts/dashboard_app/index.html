<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>Investment Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%2314b8a6'/%3E%3Cpath d='M5 16l4-5 3 3 6-8' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
/* ============================== THEME ============================== */
:root{
  --bg:#0a0f1c; --bg-rail:#080c17; --panel:#111a2e; --panel-2:#16213a; --panel-3:#1b2745;
  --line:#22304f; --line-soft:#1a2540;
  --text:#e8ecf6; --muted:#8b96b8; --faint:#57628a;
  --accent:#22c3a6; --accent-2:#1aa78e; --accent-soft:rgba(34,195,166,.14);
  --success:#33c47a; --success-soft:rgba(51,196,122,.15);
  --warn:#e0a83d; --warn-soft:rgba(224,168,61,.16);
  --danger:#f2555a; --danger-soft:rgba(242,85,90,.15);
  --shadow:0 10px 28px rgba(0,0,0,.38);
  --row:104px; --gap:16px;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,"Cascadia Mono",Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
}
/* Default look is DARK regardless of OS preference (user decision) — light only
   applies when explicitly chosen via the toggle (data-theme="light", persisted). */
:root[data-theme="light"]{
  --bg:#eef1f7; --bg-rail:#e6eaf3; --panel:#ffffff; --panel-2:#f6f8fc; --panel-3:#eef1f9;
  --line:#dde3ef; --line-soft:#e7ebf5;
  --text:#161f36; --muted:#5b6685; --faint:#98a1bb;
  --accent-soft:rgba(26,167,142,.12);
  --success-soft:rgba(51,196,122,.12); --warn-soft:rgba(224,168,61,.14); --danger-soft:rgba(242,85,90,.12);
  --shadow:0 10px 24px rgba(30,40,70,.10);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.4;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;transition:background .25s,color .25s}
button,input{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
svg{display:block}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* ============================== SHELL / RAIL ============================== */
.shell{display:flex;min-height:100vh}
.rail{width:212px;flex-shrink:0;background:var(--bg-rail);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:30;transition:background .25s,border-color .25s}
.rail-brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px}
.rail-brand .mark{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;
  background:linear-gradient(150deg,var(--accent),var(--accent-2));color:#04231d;box-shadow:var(--shadow)}
.rail-brand .mark svg{width:18px;height:18px}
.rail-brand .rb-name{font-size:14px;font-weight:750;letter-spacing:-.01em;line-height:1.2}
.rail-brand .rb-sub{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.rail-nav{display:flex;flex-direction:column;gap:2px;padding:10px 10px;flex:1;overflow-y:auto}
.rail-section{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:700;
  padding:14px 10px 6px}
.rail-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;border:none;background:none;
  color:var(--muted);cursor:pointer;text-align:left;width:100%;font-size:13px;font-weight:600;transition:background .15s,color .15s;
  text-decoration:none;box-sizing:border-box}
.rail-item svg{width:17px;height:17px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rail-item:hover:not(.disabled){background:var(--panel-2);color:var(--text)}
.rail-item.active{background:var(--accent-soft);color:var(--accent)}
.rail-item.active svg{stroke:var(--accent)}
.rail-item.disabled{color:var(--faint);cursor:default;opacity:.55}
.rail-item .soon{margin-left:auto;font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;
  background:var(--panel-3);color:var(--faint);border-radius:5px;padding:2px 5px}
/* External link-out items (2026-07-17): plain <a target="_blank">, so they
   never touch UI.screen — the ↗ makes the "leaves the app" behaviour explicit. */
.rail-item .ext-ind{margin-left:auto;font-size:12px;color:var(--faint);flex-shrink:0;transition:color .15s}
.rail-item:hover .ext-ind{color:var(--accent)}
.rail-bottom{padding:12px 10px 16px;border-top:1px solid var(--line-soft);display:flex;flex-direction:column;gap:8px}
.theme-toggle{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;border:none;
  background:var(--panel-2);color:var(--muted);cursor:pointer;width:100%;font-size:12.5px;font-weight:600}
.theme-toggle:hover{color:var(--text)}
.theme-toggle svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ============================== MAIN ============================== */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:color-mix(in oklab,var(--bg) 88%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 26px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.topbar h1{margin:0;font-size:18px;font-weight:750;letter-spacing:-.01em}
.topbar .meta{font-size:11.5px;color:var(--faint);display:flex;align-items:center;gap:7px;margin-top:1px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex-shrink:0}
.status-dot.ok{background:var(--success);box-shadow:0 0 0 3px var(--success-soft)}
.status-dot.bad{background:var(--danger);box-shadow:0 0 0 3px var(--danger-soft)}
.status-dot.pending{background:var(--warn);animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.topbar-titlewrap{min-width:0}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:9px}
.pipe-status-wrap{position:relative}
.pipe-status-pop{position:absolute;top:calc(100% + 8px);right:0;z-index:50;min-width:300px;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
  padding:12px 14px;font-size:12px}
.pipe-status-pop h4{margin:0 0 2px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.pipe-status-pop .psp-run{font-size:14px;font-weight:700;margin-bottom:10px}
.pipe-status-pop .psp-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:4px 0;border-top:1px solid var(--line-soft)}
.pipe-status-pop .psp-name{color:var(--text)}
.pipe-status-pop .psp-age{font-variant-numeric:tabular-nums;color:var(--muted)}
.pipe-status-pop .psp-age.stale{color:var(--danger);font-weight:700}
.pipe-status-pop .psp-age.absent{color:var(--faint)}
.btn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:650;padding:8px 13px;
  border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--text);cursor:pointer;
  transition:background .15s,border-color .15s,transform .1s}
.btn:hover{background:var(--panel-2)}
.btn:active{transform:translateY(1px)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn.primary{background:linear-gradient(150deg,var(--accent),var(--accent-2));border-color:transparent;color:#04231d}
.btn.primary:hover{filter:brightness(1.06)}
.btn.active{background:var(--accent-soft);border-color:color-mix(in oklab,var(--accent) 45%,var(--line));color:var(--accent)}
.btn.icon-only{padding:8px}
.btn .spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.content{padding:20px 26px 64px;flex:1}

/* ============================== GRID / WIDGETS ============================== */
.grid{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:var(--row);gap:var(--gap);
  grid-auto-flow:row dense}
.widget{grid-column:span var(--span,12);background:var(--panel);border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;min-width:0;
  animation:widgetIn .3s cubic-bezier(.3,.7,.4,1) both}
@keyframes widgetIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.widget[data-size="S"]{grid-row:span 1}
.widget[data-size="M"]{grid-row:span 2}
.widget[data-size="L"]{grid-row:span 3}
.widget[data-size="XL"]{grid-row:span 8}
.grid.editing .widget{border-style:dashed;border-color:color-mix(in oklab,var(--accent) 40%,var(--line))}
.widget.dragging{opacity:.4}
.widget-head{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--line-soft);
  flex-shrink:0;min-height:38px}
.widget-title{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.055em;color:var(--muted);
  margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.widget-titlewrap{display:flex;flex-direction:column;gap:1px;min-width:0}
.widget-subcap{font-size:10px;font-weight:500;color:var(--faint);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:360px;text-transform:none;letter-spacing:normal}
.widget-subcap[hidden]{display:none}
.widget-action{margin-left:auto;display:flex;align-items:center;gap:6px;min-width:0}
.drag-handle{cursor:grab;color:var(--faint);font-size:13px;line-height:1;flex-shrink:0;padding:2px}
.drag-handle:active{cursor:grabbing}
.widget-remove{flex-shrink:0;width:20px;height:20px;border-radius:6px;border:1px solid var(--line);background:var(--panel-2);
  color:var(--muted);cursor:pointer;font-size:13px;line-height:1;display:grid;place-items:center}
.widget-remove:hover{background:var(--danger-soft);border-color:color-mix(in oklab,var(--danger) 40%,var(--line));color:var(--danger)}
.widget-body{flex:1;min-height:0;padding:12px 14px 13px;display:flex;flex-direction:column}

.grid-spacer{grid-column:span var(--span,1);grid-row:span 1;pointer-events:none}
.ghost-tile{grid-column:span var(--span,3);grid-row:span 1;border:1.5px dashed var(--line);border-radius:14px;
  display:flex;align-items:center;justify-content:center;padding:10px;min-height:104px}
.ghost-tile[data-size="M"]{grid-row:span 2}
.ghost-tile[data-size="L"]{grid-row:span 3}
.ghost-tile button{display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;
  color:var(--faint);cursor:pointer;font-size:11.5px;font-weight:600;text-align:center;padding:6px}
.ghost-tile button:hover{color:var(--accent)}
.ghost-tile button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.empty-note{color:var(--faint);font-size:12px;padding:20px;text-align:center;grid-column:1/-1}

/* ============================== METRIC CARDS ============================== */
/* Compact layout (2026-07-17): narrower cards (span 2, not 3), graphic BELOW
   the text rather than beside it, smaller type, tighter body padding — so more
   metric cards fit per row as the user keeps adding widgets. */
.widget-body.metric-body{padding:9px 11px 9px}
.metric{display:flex;flex-direction:column;justify-content:space-between;align-items:flex-start;gap:4px;flex:1;min-height:0;overflow:hidden}
.metric-main{min-width:0;width:100%}
.metric-value{font-family:var(--mono);font-size:16.5px;font-weight:750;letter-spacing:-.01em;line-height:1.08}
.metric-sub{margin-top:3px;display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--muted)}
.metric-graphic{flex-shrink:0;display:flex;align-items:center;width:100%;margin-top:0;line-height:0;overflow:hidden}
.tip{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;
  background:var(--panel-3);color:var(--faint);font-size:10px;font-weight:700;cursor:help;position:relative;flex-shrink:0}
.tip[data-tip]:hover::after,.tip[data-tip]:focus::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);
  left:50%;transform:translateX(-50%);background:var(--panel-3);color:var(--text);border:1px solid var(--line);
  border-radius:8px;padding:8px 10px;font-size:11px;font-weight:500;line-height:1.35;width:190px;white-space:normal;
  box-shadow:var(--shadow);z-index:40;text-transform:none;letter-spacing:normal}

/* ============================== CHIPS / BADGES ============================== */
.chip{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;font-family:var(--mono)}
.chip-up{color:var(--success)} .chip-down{color:var(--danger)} .chip-flat{color:var(--faint)}
.badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;
  text-transform:uppercase;letter-spacing:.04em}
.badge-auto{background:var(--panel-3);color:var(--muted)}
.badge-manual{background:var(--accent-soft);color:var(--accent)}
.badge-muted{background:var(--panel-3);color:var(--faint)}

/* ============================== ZONEBAR ============================== */
.zonebar{display:flex;align-items:center;gap:8px;min-width:120px}
.zb-track{position:relative;flex:1;height:6px;border-radius:3px;
  background:linear-gradient(90deg,var(--danger) 0%,var(--warn) 22%,var(--success) 55%,var(--success) 100%);
  opacity:.85}
.zb-marker{position:absolute;top:-3px;width:3px;height:12px;border-radius:2px;background:var(--text);
  box-shadow:0 0 0 2px var(--panel);transform:translateX(-50%)}
.zb-marker.danger{background:var(--danger);box-shadow:0 0 0 3px var(--danger-soft)}
.zb-label{font-family:var(--mono);font-size:11px;font-weight:700;width:44px;flex-shrink:0;text-align:right}
.zb-empty .zb-track{background:var(--panel-3)}
.zb-empty .zb-label{color:var(--faint)}

/* ============================== RING ============================== */
.ring-wrap{display:flex;align-items:center;gap:16px}
.ring text{fill:var(--text);font-family:var(--sans)}
.ring .ring-l1{font-size:20px;font-weight:750}
.ring .ring-l2{font-size:9.5px;fill:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.ring-legend{display:flex;flex-direction:column;gap:7px;min-width:0;flex:1}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-item b{color:var(--text);font-family:var(--mono);margin-left:auto;padding-left:14px}
.legend-item .li-label{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.legend-item .li-pct{font-family:var(--mono);color:var(--faint);font-size:10px;flex-shrink:0;text-align:right;min-width:26px}
.legend-item .li-val{font-family:var(--mono);color:var(--text);font-weight:700;font-size:11px;flex-shrink:0;min-width:50px;text-align:right}

/* ---- Targets widget ---- */
.targets-body{display:flex;flex-direction:column;flex:1;min-height:0}
.targets-headline{display:flex;align-items:baseline;gap:8px;flex-shrink:0;margin-bottom:10px}
.targets-value{font-family:var(--mono);font-size:22px;font-weight:750;letter-spacing:-.01em}
.targets-value .unit{font-size:11px;font-weight:600;color:var(--muted);margin-left:2px}
.targets-annual{font-size:11px;color:var(--muted)}
.targets-ring-wrap{flex:1;min-height:0;gap:12px}

/* ---- Activity widget (action centre) ---- */
.activity-body{display:flex;flex-direction:column;flex:1;min-height:0}
.activity-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;min-height:100px}
.activity-row{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:9px;padding:8px 12px}
.activity-row-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.activity-pill{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;padding:2px 7px;
  border-radius:5px;flex-shrink:0}
.activity-pill.pill-high{background:var(--danger-soft);color:var(--danger)}
.activity-pill.pill-medium{background:var(--warn-soft);color:var(--warn)}
.activity-pill.pill-low{background:var(--panel-3);color:var(--faint)}
.activity-cat{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;padding:2px 7px;
  border-radius:5px;background:var(--panel-3);color:var(--muted);flex-shrink:0}
.activity-title{font-size:12.5px;font-weight:650;flex:1;min-width:180px}
.activity-detail{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.activity-link{margin-left:auto;flex-shrink:0;font-size:11px;font-weight:650;color:var(--accent);
  background:var(--accent-soft);border:none;border-radius:6px;padding:4px 9px;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px}
.activity-link:hover{filter:brightness(1.1)}
.activity-charts{flex-shrink:0;margin-top:8px;border-top:1px solid var(--line-soft);padding-top:8px}
.activity-charts-toggle{display:flex;align-items:center;gap:6px;width:100%;background:none;border:none;
  color:var(--text);font-size:12px;font-weight:650;cursor:pointer;padding:2px 0}
.activity-charts-toggle svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .2s}
.activity-charts-toggle[aria-expanded="true"] svg{transform:rotate(90deg)}
.activity-charts-list{display:none;flex-wrap:wrap;gap:6px;margin-top:8px;max-height:150px;overflow-y:auto}
.activity-charts-list.open{display:flex}
.activity-chart-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:var(--mono);
  font-weight:700;background:var(--panel-3);border-radius:6px;padding:3px 8px;color:var(--text);text-decoration:none}
.activity-chart-chip:hover{background:var(--accent-soft);color:var(--accent)}
.activity-chart-chip .dim-ticker{color:var(--faint)}

/* ---- Relevant News widget ---- */
.news-list{display:flex;flex-direction:column;gap:0;overflow-y:auto;flex:1;min-height:0}
.news-row{display:flex;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid var(--line-soft);font-size:11.5px}
.news-row:last-child{border-bottom:none}
.news-chip-date{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);background:var(--panel-3);
  border-radius:5px;padding:2px 6px;flex-shrink:0;white-space:nowrap}
.news-chip-event{font-size:9.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:5px;
  padding:2px 6px;flex-shrink:0;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.news-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.news-ticker{color:var(--faint);font-weight:500;font-size:10px}
.news-amt{font-family:var(--mono);font-weight:700;flex-shrink:0;min-width:52px;text-align:right}
.news-yield{font-family:var(--mono);color:var(--muted);font-size:10.5px;flex-shrink:0;min-width:40px;text-align:right}

/* ============================== SPARKLINE ============================== */
.sparkline{width:100%;height:20px;overflow:visible;display:block}
.intel-spark{height:40px;margin-top:6px}
.intel-spark .sparkline{height:40px}

/* ============================== CHART (value over time) ============================== */
/* Kept to Medium height (2026-07-17) — compressed viewBox/padding above and
   here so the plot stays legible at ~224px instead of the old Large height. */
.chart-widget-body{padding:5px 6px 2px}
.chart-svg-wrap{flex:1;min-height:0;position:relative}
.chart-svg-wrap svg{width:100%;height:100%}
.chart-xlabels{display:flex;justify-content:space-between;padding:1px 32px 0 32px;font-size:9.5px;color:var(--faint)}
.seg{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px}
.seg button{background:none;border:none;color:var(--muted);font-size:11px;font-weight:650;padding:5px 9px;
  border-radius:6px;cursor:pointer}
.seg button.active{background:var(--accent);color:#04231d}

/* ============================== TABLES ============================== */
.table-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-shrink:0}
.search-input{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;
  font-size:12px;color:var(--text);width:200px;max-width:40vw}
.search-input::placeholder{color:var(--faint)}
.tabs{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px}
.tab{background:none;border:none;color:var(--muted);font-size:11.5px;font-weight:650;padding:6px 11px;
  border-radius:6px;cursor:pointer}
.tab.active{background:var(--accent);color:#04231d}
.row-count{margin-left:auto;font-size:11px;color:var(--faint)}
.table-scroll{flex:1;min-height:0;overflow:auto;border-radius:9px;border:1px solid var(--line-soft)}
table{width:100%;border-collapse:collapse;font-size:12.5px}

          <span>Refresh</span>

        <button class="btn" id="editBtn" title="Rearrange widgets">

<script>
'use strict';
/* ======================================================================
   Investment Dashboard — front end (Phase 1)
   Self-contained: no external libraries, no CDN, everything inline.
   ====================================================================== */

/* ---------------------------- formatters ---------------------------- */
function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtMoney(n,decimals){
  if(decimals==null) decimals=0;
  if(n==null||isNaN(n)) return '—';
  return '£'+Number(n).toLocaleString('en-GB',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}
function fmtMoneyCompact(n){
  if(n==null||isNaN(n)) return '—';
  const abs=Math.abs(n);
  if(abs>=1000000) return '£'+(n/1000000).toFixed(2)+'M';
  if(abs>=1000) return '£'+(n/1000).toFixed(1)+'k';
  return fmtMoney(n,0);
}
// Chart/alert prices are quoted in the SYMBOL's own unit — UK pence for every
// equity and ETC, USD for the commodity symbols — NOT pounds. Rendering them with
// a '£' made 3614.56p read as £3,614.56, so the unit is labelled instead.
function fmtPrice(n,unit){
  if(n==null||isNaN(n)) return '—';
  const v=Number(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
  return unit==='$' ? '$'+v : v+'p';
}
function fmtPct(n,decimals){
  if(decimals==null) decimals=1;
  if(n==null||isNaN(n)) return '—';
  return Number(n).toFixed(decimals)+'%';
}
function fmtNum(n){
  if(n==null||isNaN(n)) return '—';
  return Number(n).toLocaleString('en-GB');
}
function fmtDate(iso){
  if(!iso) return '—';
  const d=new Date(iso+'T00:00:00');
  if(isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
// Compact 2-digit-year form for tight list rows (Relevant News) — the year is
// kept (not dropped) because some ex-div dates are stale prior-year entries and
// the year is exactly what signals that at a glance.
function fmtShortDate(iso){
  if(!iso) return '—';
  const d=new Date(iso+'T00:00:00');
  if(isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});
}
function fmtDateTime(iso){
  if(!iso) return '—';
  const d=new Date(iso);
  if(isNaN(d.getTime())) return iso;
  return d.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}
// Truncates a long free-text cell (notes, chart annotations…) to keep table
// rows dense, with the full text available via native title-attribute hover.
function truncCell(text,maxWidth){
  if(!text) return '<span class="dim">—</span>';
  return '<span class="trunc" style="max-width:'+(maxWidth||180)+'px" title="'+escapeHtml(text)+'">'+escapeHtml(text)+'</span>';
}

/* ---------------------------- small SVG kit ---------------------------- */
function sparklineSVG(values,opts){
  opts=opts||{};
  const width=opts.width||96, height=opts.height||30, color=opts.color||'var(--accent)';
  const vals=(values||[]).filter(v=>v!=null);
  if(vals.length<2) return '<span class="dim" style="font-size:11px">no trend yet</span>';
  const min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
  const range=(max-min)||Math.abs(max)||1;
  const stepX=width/(vals.length-1);
  const pts=vals.map((v,i)=>[i*stepX, height-2-((v-min)/range)*(height-4)]);
  const path=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const area=path+' L'+width+','+height+' L0,'+height+' Z';
  const id='sg'+Math.random().toString(36).slice(2,9);
  return '<svg class="sparkline" viewBox="0 0 '+width+' '+height+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="'+color+'" stop-opacity="0.35"/>'+
    '<stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#'+id+')" stroke="none"/>'+
    '<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>'+
    '</svg>';
}
// Trend colour by first-vs-last % change (user spec 2026-07-18): green when up
// (> +1%), red when down (< -1%), yellow when flat/sideways (between -1% and +1%).
function trendColor(series){
  const v=(series||[]).filter(x=>x!=null);
  if(v.length<2) return 'var(--muted)';
  const pct=(v[v.length-1]-v[0])/(Math.abs(v[0])||1)*100;
  return pct>1 ? 'var(--success)' : pct<-1 ? 'var(--danger)' : '#e0b400';
}
// Reusable widget sparklines, coloured by trend (green/red/yellow):
//   dailySparkline   — 30 days of closing prices
//   monthlySparkline — the previous 6 months within the current year
function trendSparkline(series,opts){
  return sparklineSVG(series, Object.assign({color:trendColor(series)}, opts||{}));
}
function dailySparkline(series,opts){ return trendSparkline((series||[]).slice(-30), opts); }
function monthlySparkline(series,opts){ return trendSparkline((series||[]).slice(-6), opts); }
function ringSVG(segments,opts){
  opts=opts||{};
  const size=opts.size||120, thickness=opts.thickness||16;
  const cx=size/2, cy=size/2, r=(size-thickness)/2, c=2*Math.PI*r;
  const total=segments.reduce((s,x)=>s+(x.value||0),0);
  let offset=0, circles='';
  if(total<=0){
    circles='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="'+thickness+'"/>';
  } else {
    segments.forEach(seg=>{
      if(!seg.value){ return; }
      const frac=seg.value/total;
      const gap=Math.min(2, frac*c*0.08);
      const dash=Math.max(0, frac*c-gap);
      circles+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+seg.color+'" stroke-width="'+thickness+
        '" stroke-dasharray="'+dash+' '+(c-dash)+'" stroke-dashoffset="'+(-offset)+'" '+
        'transform="rotate(-90 '+cx+' '+cy+')" stroke-linecap="round"/>';
      offset+=frac*c;
    });
  }
  const l1=opts.centerLine1!=null?'<text x="'+cx+'" y="'+(cy-(opts.centerLine2?4:-6))+'" text-anchor="middle" class="ring-l1">'+escapeHtml(opts.centerLine1)+'</text>':'';
  const l2=opts.centerLine2?'<text x="'+cx+'" y="'+(cy+16)+'" text-anchor="middle" class="ring-l2">'+escapeHtml(opts.centerLine2)+'</text>':'';
  return '<svg class="ring" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+circles+l1+l2+'</svg>';
}
function zonebar(gapPct){
  if(gapPct==null||isNaN(gapPct)) return '<div class="zonebar zb-empty"><span class="zb-track"></span><span class="zb-label">—</span></div>';
  const below=gapPct<=0;
  const maxScale=30;
  const clamped=Math.max(0,Math.min(maxScale,gapPct));
  const fillPct=(clamped/maxScale)*100;
  return '<div class="zonebar">'+
    '<span class="zb-track"><span class="zb-marker'+(below?' danger':'')+'" style="left:'+fillPct+'%"></span></span>'+
    '<span class="zb-label" style="color:'+(below?'var(--danger)':gapPct<5?'var(--warn)':'var(--success)')+'">'+
    (below?'BELOW':fmtPct(gapPct,1))+'</span></div>';
}
function deltaChip(value,opts){
  opts=opts||{};
  const kind=opts.kind||'pct', decimals=opts.decimals==null?1:opts.decimals;
  if(value==null||isNaN(value)) return '<span class="chip chip-flat">—</span>';
  const up=value>0, down=value<0;
  const cls=up?'chip-up':down?'chip-down':'chip-flat';
  const arrow=up?'▲':down?'▼':'▬';
  const sign=up?'+':down?'−':'';
  const text=kind==='money'?fmtMoney(Math.abs(value),decimals):fmtPct(Math.abs(value),decimals);
  return '<span class="chip '+cls+'">'+arrow+' '+sign+text+'</span>';
}
function proximityChip(value){
  if(value==null||isNaN(value)) return '<span class="chip chip-flat">—</span>';
  const below=value<=0, near=value>0&&value<5;
  const color=below?'var(--danger)':near?'var(--warn)':'var(--success)';
  const arrow=below?'▼':'▲';
  return '<span class="chip" style="color:'+color+'">'+arrow+' '+fmtPct(Math.abs(value),1)+'</span>';
}
// Watchlist proximity is a BUY-signal chip: negative (at/below the alert low)
// is the desirable state, so the colour mapping is deliberately inverted from
// proximityChip() above (which treats "below" as a warning for held positions).
function watchlistProximityChip(value){
  if(value==null||isNaN(value)) return '<span class="chip chip-flat">—</span>';
  const atOrBelow=value<=0, near=value>0&&value<5;
  const color=atOrBelow?'var(--success)':near?'var(--warn)':'var(--danger)';
  const arrow=atOrBelow?'▼':'▲';
  const sign=value>0?'+':'';
  return '<span class="chip" style="color:'+color+'">'+arrow+' '+sign+fmtPct(value,2)+'</span>';
}
// Same formula portfolio.json uses for gap_to_low_pct, computed client-side
// since watchlist.json only carries current/alert_low/alert_high.
function gapToLowPct(current,alertLow){
  if(current==null||alertLow==null||!current) return null;
  return (current-alertLow)/current*100;
}
function sourceBadge(src){
  if(!src) return '<span class="badge badge-muted">—</span>';
  const cls=String(src).toLowerCase()==='manual'?'badge-manual':'badge-auto';
  return '<span class="badge '+cls+'">'+escapeHtml(src)+'</span>';
}
function trendArrow(value,opts){
  opts=opts||{};
  const size=opts.size||9;
  if(value==null||isNaN(value)||value===0) return '';
  const up=value>0;
  const color=up?'var(--success)':'var(--danger)';
  const path=up?('M'+(size/2)+',0 L'+size+','+size+' L0,'+size+' Z'):('M0,0 L'+size+',0 L'+(size/2)+','+size+' Z');
  return '<svg class="trend-arrow" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><path d="'+path+'" fill="'+color+'"/></svg>';
}

/* ---------------------------- icon kit (nav / chrome) ---------------------------- */
const ICONS={

  clock:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v5l3.5 2"/></svg>',

  doc:'<svg viewBox="0 0 24 24"><path d="M6.5 2.5h8l5 5v14h-13z"/><path d="M14.5 2.5v5h5"/></svg>',

  moon:'<svg viewBox="0 0 24 24"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>',

  flow:'<svg viewBox="0 0 24 24"><circle cx="5" cy="6" r="2.3"/><circle cx="19" cy="6" r="2.3"/><circle cx="12" cy="18" r="2.3"/><path d="M7.2 7.1L11 16M16.8 7.1L13 16M7.3 6h9.4"/></svg>',
  pulse:'<svg viewBox="0 0 24 24"><path d="M3 12.5h4l2.5-6 4 12 2.5-7 1.5 2h3.5"/></svg>',
  refresh:'<svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.3-5.6"/><path d="M20 4v4h-4"/></svg>',
};

/* ---------------------------- app state ---------------------------- */
const DATA={overview:null, portfolio:null, historic:null, watchlist:null, targets:null, news:null, activity:null};
const UI={
  screen:'overview',   // always open on Overview (user request 2026-07-18), regardless of last-viewed
  editMode:false,
  chart:{timeframe:'ALL'},
  holdings:{tab:'investments',
    invSort:{key:'name',dir:'asc'}, incSort:{key:'name',dir:'asc'}, filter:''},
  sold:{sort:{key:'sell_date',dir:'desc'}, filter:''},
  dividends:{sort:{key:'name',dir:'asc'}, filter:''},
  watchlist:{sort:{key:'proximity_pct',dir:'asc'}, filter:''},
};

const NAV_ITEMS=[
  {id:'overview', label:'Overview', icon:ICONS.grid, enabled:true},
  {id:'portfolio', label:'Portfolio', icon:ICONS.briefcase, enabled:true},

WIDGET_DEFS.overview.push({
  id:'value-over-time', title:'Portfolio Value Over Time', size:'M', span:6,
  mount(body,action){
    const frames=['3M','6M','YTD','1Y','ALL'];
    action.innerHTML='<div class="seg">'+frames.map(f=>'<button data-tf="'+f+'" class="'+(UI.chart.timeframe===f?'active':'')+'">'+f+'</button>').join('')+'</div>';
    action.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click',()=>{
        UI.chart.timeframe=btn.dataset.tf;
        action.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b===btn));
        draw();
      });
    });
    body.classList.add('chart-widget-body');
    body.innerHTML='<div class="chart-svg-wrap"></div><div class="chart-xlabels"></div>';
    const svgWrap=body.querySelector('.chart-svg-wrap');
    const xlabels=body.querySelector('.chart-xlabels');
    function slice(){
      const vot=DATA.overview.value_over_time||{labels:[],portfolio:[]};
      const labels=vot.labels||[], values=vot.portfolio||[];
      const n=labels.length, tf=UI.chart.timeframe;
      let start=0;
      if(tf==='3M') start=Math.max(0,n-3);
      else if(tf==='6M') start=Math.max(0,n-6);
      else if(tf==='1Y') start=Math.max(0,n-12);
      else if(tf==='YTD'){
        const year=String(new Date().getFullYear());
        const idx=labels.findIndex(l=>l.indexOf(year)!==-1);
        start=idx===-1?0:idx;
      }
      return {labels:labels.slice(start), values:values.slice(start)};
    }
    function draw(){
      const {labels,values}=slice();
      if(values.length<2){ svgWrap.innerHTML='<div class="dim" style="padding:24px;text-align:center">Not enough data for this range</div>'; xlabels.innerHTML=''; return; }
      const W=760,H=132,padL=42,padR=12,padT=8,padB=6;
      const min=Math.min.apply(null,values), max=Math.max.apply(null,values);
      const range=(max-min)||1;
      const plotW=W-padL-padR, plotH=H-padT-padB;
      const stepX=plotW/(values.length-1);
      const pts=values.map((v,i)=>[padL+i*stepX, padT+plotH-((v-min)/range)*plotH]);
      const path=pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
      const area=path+' L'+pts[pts.length-1][0].toFixed(1)+','+(padT+plotH)+' L'+pts[0][0].toFixed(1)+','+(padT+plotH)+' Z';
      const gridLines=[0,0.5,1].map(f=>{
        const y=padT+plotH*f; const val=max-range*f;
        return '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--line-soft)" stroke-width="1"/>'+
          '<text x="'+(padL-8)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="var(--faint)">'+fmtMoneyCompact(val)+'</text>';
      }).join('');
      const dots=pts.map((p,i)=>'<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2.1" fill="var(--accent)"><title>'+
        escapeHtml(labels[i])+': '+fmtMoney(values[i],0)+'</title></circle>').join('');
      svgWrap.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
        '<defs><linearGradient id="vot-fill" x1="0" y1="0" x2="0" y2="1">'+
        '<stop offset="0%" stop-color="var(--accent)" stop-opacity="0.28"/>'+
        '<stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>'+
        gridLines+
        '<path d="'+area+'" fill="url(#vot-fill)" stroke="none"/>'+
        '<path d="'+path+'" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>'+
        dots+'</svg>';
      const skip=Math.max(1,Math.ceil(labels.length/8));
      xlabels.innerHTML=labels.map((l,i)=>'<span style="opacity:'+(i%skip===0||i===labels.length-1?1:0)+'">'+escapeHtml(l)+'</span>').join('');
    }
    draw();
  }
});

    function sortRows(rows,sortState,cols){
      const col=cols.find(c=>c.key===sortState.key)||cols[0];
      const dir=sortState.dir;
      const copy=rows.slice();
      copy.sort((a,b)=>{
        let av=col.sv(a), bv=col.sv(b);
        if(av==null&&bv==null) return 0;
        if(av==null) return 1;
        if(bv==null) return -1;
        if(typeof av==='string') return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
        return dir==='asc'?av-bv:bv-av;
      });
      return copy;
    }
    function headerRow(cols,sortState){
      return '<tr>'+cols.map(c=>{

        const cls=[sorted?'sorted':'', c.num?'num':''].filter(Boolean).join(' ');
        return '<th data-key="'+c.key+'" class="'+cls+'">'+escapeHtml(c.label)+
          (ind?' <span class="sort-ind">'+ind+'</span>':'')+'</th>';
      }).join('')+'</tr>';
    }
    function wireHeaders(theadEl,cols,sortState,redraw){

          if(!col||col.noSort) return;
          if(sortState.key===th.dataset.key) sortState.dir=sortState.dir==='asc'?'desc':'asc';

          redraw();

      rowCount.textContent=rows.length+' of '+(DATA.portfolio.investments||[]).length;
      const body_ = rows.map(r=>{
        return '<tr>'+
          '<td><div class="cell-name">'+escapeHtml(r.name)+'</div><div class="cell-sub">'+escapeHtml(r.ticker||'')+'</div></td>'+

/* ---------------------- Intelligence (live index widgets) ---------------------- */
// Live market indices fetched SERVER-side from the Yahoo Finance chart API
// (/api/intelligence — the browser can't call Yahoo cross-origin). Cached in this
// module; each widget's ↻ button forces a fresh pull for just these widgets (?refresh=1).
const INTEL={loaded:false, loading:false, error:null, at:null, indices:{}};
async function loadIntelligence(force){
  if(INTEL.loading) return;
  INTEL.loading=true;
  if(UI.screen==='intelligence') renderGrid();
  try{
    const r=await fetch('/api/intelligence'+(force?'?refresh=1':''));
    const j=await r.json();
    INTEL.indices=j.indices||{}; INTEL.at=j.at; INTEL.error=j.error||null; INTEL.loaded=true;
  }catch(e){ INTEL.error='Could not reach the market-data service'; }
  INTEL.loading=false;
  if(UI.screen==='intelligence') renderGrid();
}
function intelNum(n){ return (n==null||isNaN(n))?'—':Number(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function sparkline(series,down){
  if(!series||series.length<2) return '<div class="spark-empty"></div>';
  const w=200,h=44,pad=3;
  const min=Math.min(...series), max=Math.max(...series), rng=(max-min)||1;
  const pts=series.map((v,i)=>{
    const x=pad+(i/(series.length-1))*(w-2*pad);
    const y=pad+(1-(v-min)/rng)*(h-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  });
  const col=down?'var(--danger)':'var(--success)';
  const area='M'+pts.join(' L')+' L'+(w-pad).toFixed(1)+','+(h-pad)+' L'+pad+','+(h-pad)+' Z';
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" aria-hidden="true">'+
    '<path d="'+area+'" fill="'+col+'" opacity="0.12"/>'+
    '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>'+
    '</svg>';
}
function mountIndexWidget(body,action,key){

  const down=(d.change_pct||0)<0;

    '<div class="intel-val">'+intelNum(d.value)+'</div>'+

      '<span class="intel-abs" style="color:'+absCol+'">'+(d.change>0?'+':'')+intelNum(d.change)+'</span></div>'+
    '<div class="intel-spark">'+dailySparkline(d.series,{width:200,height:44})+'</div>'+
    '<div class="intel-meta">'+escapeHtml((d.currency?d.currency+' · ':'')+'as of '+(d.as_of||'—'))+'</div>';
}
[['ftse','FTSE 100'],['dax','DAX'],['stoxx50','Euro STOXX 50'],['spx','S&P 500'],['nasdaq','Nasdaq'],['dow','Dow Jones']]

/* ---------------------- Design (Widgets — order control for every screen) ---------------------- */
WIDGET_DEFS.design.push({
  id:'overview-order', title:'Widgets', size:'XL', span:12,
  mount(body,action){
    action.innerHTML='<button class="chip-btn" id="dlResetOrder">Reset all to default</button>';

    body.innerHTML='<div class="design-hint">Every widget on every screen. The number sets left-to-right, '+
      'then top-to-bottom placement on that screen. Edit the numbers and click Apply — this updates the same '+
      'order Edit-mode drag-and-drop uses, so it persists across reloads.</div>'+
      '<div class="design-list"></div>'+
      '<div class="design-actions"><button class="chip-btn primary" id="dlApplyOrder">Apply order</button>'+
      '<span class="design-status" id="dlOrderStatus"></span></div>';
    const listEl=body.querySelector('.design-list');
    const statusEl=body.querySelector('#dlOrderStatus');

    // Every screen with widgets, in nav order. Each widget gets a per-screen
    // number: currently-visible ones keep their real position, anything removed
    // via Edit-mode is appended after them so Apply can bring it back at a
    // sensible spot rather than losing it silently.
    const SCREENS=Object.keys(WIDGET_DEFS).filter(s=>WIDGET_DEFS[s] && WIDGET_DEFS[s].length);
    function positionsFor(screen){
      const order=getOrder(screen);
      const all=WIDGET_DEFS[screen].map(w=>w.id);
      const extra=all.filter(id=>order.indexOf(id)===-1);
      const seq=order.concat(extra);
      const pos={};
      seq.forEach((id,i)=>{ pos[id]=i+1; });
      return pos;
    }
    function renderList(){
      listEl.innerHTML=SCREENS.map(screen=>{
        const pos=positionsFor(screen);
        const defs=WIDGET_DEFS[screen].slice().sort((a,b)=>pos[a.id]-pos[b.id]);
        const rows=defs.map(d=>{
          return '<div class="design-row" data-id="'+d.id+'" data-screen="'+screen+'">'+
            '<span class="design-num"><input type="number" min="1" max="'+defs.length+'" step="1" value="'+pos[d.id]+'"></span>'+
            '<span class="design-name">'+escapeHtml(d.title)+'</span>'+
            '<span class="design-size">'+(SIZE_LABELS[d.size]||d.size)+'</span>'+
            '</div>';
        }).join('');
        return '<div class="design-group-title">'+escapeHtml(SCREEN_TITLES[screen]||screen)+'</div>'+rows;
      }).join('');
    }
    function applyOrder(){
      SCREENS.forEach(screen=>{
        const rows=Array.from(listEl.querySelectorAll('.design-row[data-screen="'+screen+'"]'));
        const entries=rows.map((r,i)=>({id:r.dataset.id, n:parseInt(r.querySelector('input').value,10), i}));
        entries.sort((a,b)=>{
          const an=isNaN(a.n)?9999:a.n, bn=isNaN(b.n)?9999:b.n;
          return an-bn || a.i-b.i;
        });
        saveOrder(screen, entries.map(e=>e.id));
      });
      statusEl.textContent='Applied — widget order updated on every screen.';
      renderList();
    }
    body.querySelector('#dlApplyOrder').addEventListener('click',applyOrder);
    action.querySelector('#dlResetOrder').addEventListener('click',()=>{
      SCREENS.forEach(screen=>saveOrder(screen, (DEFAULT_ORDER[screen]||[]).slice()));
      statusEl.textContent='Reset every screen to default order.';
      renderList();
    });
    renderList();
  }
});

const DEFAULT_ORDER={
  overview: WIDGET_DEFS.overview.map(w=>w.id),
  portfolio: WIDGET_DEFS.portfolio.map(w=>w.id),
  historic: WIDGET_DEFS.historic.map(w=>w.id),
  watchlist: WIDGET_DEFS.watchlist.map(w=>w.id),
  intelligence: WIDGET_DEFS.intelligence.map(w=>w.id),
  design: WIDGET_DEFS.design.map(w=>w.id),
};

/* ---------------------------- layout persistence ---------------------------- */
// Bump the version when the DEFAULT order changes: a saved layout wins over the
// default for widgets it already lists, so without a new key an existing browser
// would keep the old arrangement for ever.
const LAYOUT_KEY='dashboard:layout:v3:';
function getOrder(screen){
  const ids=WIDGET_DEFS[screen].map(d=>d.id);
  let saved=null;
  try{
    const raw=localStorage.getItem(LAYOUT_KEY+screen);
    if(raw){ const arr=JSON.parse(raw); saved=arr.filter(id=>ids.indexOf(id)!==-1); }
  }catch(e){}
  const base=(saved&&saved.length)?saved:DEFAULT_ORDER[screen].slice();
  // Insert any widget missing from the saved order at its DEFAULT_ORDER position, so a
  // newly-added widget appears where it's defined (e.g. at the top) instead of vanishing.
  const def=DEFAULT_ORDER[screen]||ids;
  ids.forEach(id=>{
    if(base.indexOf(id)!==-1) return;
    const di=def.indexOf(id);
    let pos=base.length;
    for(let i=0;i<base.length;i++){ if(def.indexOf(base[i])>di){ pos=i; break; } }
    base.splice(pos,0,id);
  });
  return base;
}
function saveOrder(screen,order){
  localStorage.setItem(LAYOUT_KEY+screen, JSON.stringify(order));
}

/* ---------------------------- render: rail ---------------------------- */
// Shared by the nav rail buttons AND any in-app "#screen" link elsewhere
// (e.g. the Activity widget's action buttons) so both paths stay in sync.
function switchScreen(id){
  const item=NAV_ITEMS.find(n=>n.id===id);
  if(!item||!item.enabled) return;
  UI.screen=id; UI.editMode=false;
  localStorage.setItem('dashboard:screen',id);
  renderRail(); renderTopbar(); renderGrid();
}
function renderRail(){
  const rail=document.getElementById('rail');
  const navHtml=NAV_ITEMS.map(item=>{
    const cls=['rail-item'];
    if(!item.enabled) cls.push('disabled');
    if(item.id===UI.screen) cls.push('active');
    return '<button class="'+cls.join(' ')+'" data-nav="'+item.id+'" '+(item.enabled?'':'disabled')+'>'+
      item.icon+'<span class="label">'+item.label+'</span>'+(item.enabled?'':'<span class="soon">Soon</span>')+'</button>';
  }).join('');
  const linksHtml=EXTERNAL_LINKS.map(item=>
    '<a class="rail-item" href="'+escapeHtml(item.href)+'" target="_blank" rel="noopener noreferrer" title="Opens '+escapeHtml(item.label)+' in a new tab">'+
    item.icon+'<span class="label">'+item.label+'</span><span class="ext-ind">↗</span></a>'
  ).join('');
  rail.innerHTML=
    '<div class="rail-brand"><div class="mark"><svg viewBox="0 0 24 24"><path d="M4 17l5-6 4 3.5L20 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
    '<div><div class="rb-name">Dashboard</div><div class="rb-sub">Investments</div></div></div>'+
    '<div class="rail-nav"><div class="rail-section">Screens</div>'+navHtml+
    '<div class="rail-section">Links</div>'+linksHtml+'</div>'+
    '<div class="rail-bottom"><button class="theme-toggle" id="themeToggle"></button></div>';
  rail.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click',()=>switchScreen(btn.dataset.nav));
  });
  syncThemeButton();
  document.getElementById('themeToggle').addEventListener('click',toggleTheme);
}

/* ---------------------------- theme ---------------------------- */
function applyTheme(t){
  if(t) document.documentElement.setAttribute('data-theme',t);
  else document.documentElement.removeAttribute('data-theme');
}
// Default look is DARK (user decision) — unset/first-run state is treated as
// dark regardless of OS preference. A saved localStorage choice always wins.
function toggleTheme(){
  const current=document.documentElement.getAttribute('data-theme');
  const effectiveDark = current ? current==='dark' : true;
  const next = effectiveDark ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('dashboard:theme',next);
  syncThemeButton();
}
function syncThemeButton(){
  const btn=document.getElementById('themeToggle');
  if(!btn) return;
  const current=document.documentElement.getAttribute('data-theme');
  const effectiveDark = current ? current==='dark' : true;
  btn.innerHTML=(effectiveDark?ICONS.sun:ICONS.moon)+'<span>'+(effectiveDark?'Light mode':'Dark mode')+'</span>';
}
(function initTheme(){
  const saved=localStorage.getItem('dashboard:theme');
  if(saved) applyTheme(saved);
})();

/* ---------------------------- render: topbar ---------------------------- */
const GRID_COLS=12;
const SCREEN_TITLES={overview:'Overview', portfolio:'Portfolio', historic:'Historic', watchlist:'Watchlist', intelligence:'Intelligence', design:'Design'};
function renderTopbar(){
  document.getElementById('screenTitle').textContent=SCREEN_TITLES[UI.screen]||UI.screen;
  const editBtn=document.getElementById('editBtn');
  editBtn.classList.toggle('active',UI.editMode);
  editBtn.querySelector('span').textContent=UI.editMode?'Done editing':'Edit layout';
  updateMeta();
}
function updateMeta(){
  const el=document.getElementById('metaText');
  const gen=DATA.overview && DATA.overview.generated_at;
  el.textContent=gen?('Data as of '+fmtDateTime(gen)):'Loading…';
}
function setStatus(state){
  const dot=document.getElementById('statusDot');
  dot.className='status-dot '+(state==='ok'?'ok':state==='bad'?'bad':state==='pending'?'pending':'');
}

/* ---------------------------- render: grid ---------------------------- */
function renderGrid(){
  const grid=document.getElementById('grid');
  grid.classList.toggle('editing',UI.editMode);
  grid.innerHTML='';
  if(UI.screen!=='intelligence' && (!DATA.overview||!DATA.portfolio||!DATA.historic||!DATA.watchlist||!DATA.targets||!DATA.news||!DATA.activity)){
    grid.innerHTML='<div class="empty-note">Loading dashboard data…</div>';
    return;
  }
  const defs=WIDGET_DEFS[UI.screen];
  const order=getOrder(UI.screen);
  // The small metric cards are half-width, so a run of them can leave the row
  // part-full and the next (medium) widget flows up beside them. Pad the leftover
  // columns with an inert spacer so each size band starts its own row — forcing a
  // grid-column-start on the medium instead does NOT work: grid can place a later
  // auto item back into the gap (2026-07-19).
  let prevSize=null, smallCols=0;
  order.forEach(id=>{
    const def=defs.find(d=>d.id===id);
    if(!def) return;
    if(def.size==='S'){ smallCols=(smallCols+Number(def.span||1))%GRID_COLS; }
    else if(prevSize==='S' && smallCols>0){
      const pad=document.createElement('div');
      pad.className='grid-spacer';
      pad.style.setProperty('--span',GRID_COLS-smallCols);
      grid.appendChild(pad);
      smallCols=0;
    }
    const el=document.createElement('section');
    el.className='widget';
    el.dataset.id=id;
    el.dataset.size=def.size;
    el.style.setProperty('--span',def.span);
    prevSize=def.size;
    if(UI.editMode) el.setAttribute('draggable','true');
    el.innerHTML='<header class="widget-head">'+
      (UI.editMode?'<span class="drag-handle" title="Drag to reorder">⠿⠿</span>':'')+
      '<div class="widget-titlewrap"><h3 class="widget-title">'+escapeHtml(def.title)+'</h3>'+
      '<div class="widget-subcap" hidden></div></div>'+
      '<div class="widget-action"></div>'+
      (UI.editMode?'<button class="widget-remove" title="Remove widget" aria-label="Remove widget">×</button>':'')+
      '</header><div class="widget-body"></div>';
    grid.appendChild(el);
    const body=el.querySelector('.widget-body');
    const action=el.querySelector('.widget-action');
    // Widgets that need a header sub-caption (e.g. Watchlist's criterion string)
    // can set el.querySelector('.widget-subcap').textContent + unhide it.
    try{ def.mount(body,action,el); }
    catch(e){ body.innerHTML='<div class="dim" style="padding:12px">Could not render this widget.</div>'; console.error('widget mount failed',id,e); }

    if(UI.editMode){
      el.querySelector('.widget-remove').addEventListener('click',()=>{
        const ord=getOrder(UI.screen).filter(x=>x!==id);
        saveOrder(UI.screen,ord);
        renderGrid();
      });
      el.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/plain',id); e.dataTransfer.effectAllowed='move'; el.classList.add('dragging'); });
      el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    }
  });

  if(UI.editMode){
    const missing=defs.filter(d=>order.indexOf(d.id)===-1);
    missing.forEach(def=>{
      const tile=document.createElement('div');
      tile.className='ghost-tile';
      tile.dataset.size=def.size;
      tile.style.setProperty('--span',def.span);
      tile.innerHTML='<button type="button"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add '+escapeHtml(def.title)+'</button>';
      tile.querySelector('button').addEventListener('click',()=>{
        const ord=getOrder(UI.screen); ord.push(def.id); saveOrder(UI.screen,ord); renderGrid();
      });
      grid.appendChild(tile);
    });
    grid.addEventListener('dragover',e=>e.preventDefault());
    grid.addEventListener('drop',e=>{
      e.preventDefault();
      const draggedId=e.dataTransfer.getData('text/plain');
      if(!draggedId) return;
      const targetEl=e.target.closest('.widget');
      let ord=getOrder(UI.screen).filter(x=>x!==draggedId);
      if(targetEl && targetEl.dataset.id!==draggedId){
        const idx=ord.indexOf(targetEl.dataset.id);
        ord.splice(idx,0,draggedId);
      } else {
        ord.push(draggedId);
      }
      saveOrder(UI.screen,ord);
      renderGrid();
    },{once:true});
  }
}

/* ---------------------------- data loading + SSE ---------------------------- */
async function loadAll(){
  const bust='?_='+Date.now();
  const [overview,portfolio,historic,watchlist,targets,news,activity]=await Promise.all([
    fetch('data/overview.json'+bust).then(r=>r.json()),
    fetch('data/portfolio.json'+bust).then(r=>r.json()),
    fetch('data/historic.json'+bust).then(r=>r.json()),
    fetch('data/watchlist.json'+bust).then(r=>r.json()),
    fetch('data/targets.json'+bust).then(r=>r.json()),
    fetch('data/news.json'+bust).then(r=>r.json()),
    fetch('data/activity.json'+bust).then(r=>r.json()),
  ]);
  DATA.overview=overview; DATA.portfolio=portfolio; DATA.historic=historic; DATA.watchlist=watchlist;
  DATA.targets=targets; DATA.news=news; DATA.activity=activity;
}

    refreshBtn.querySelector('svg').classList.add('spin');
    setStatus('pending');
    try{ await fetch('/refresh',{method:'POST'}); }catch(e){}

// Overview status button (user request 2026-07-18): shows the last pipeline run and
// the age of each input file, fetched from /api/pipeline-status on demand.
function wirePipeStatus(){
  const btn=document.getElementById('pipeStatusBtn');
  const pop=document.getElementById('pipeStatusPop');
  const label=document.getElementById('pipeStatusLabel');
  if(!btn) return;
  function fmtRun(iso){ if(!iso) return '—'; const d=new Date(iso); return isNaN(d)?iso:d.toLocaleDateString(undefined,{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}); }
  function ageTxt(f){ if(!f.present) return 'not present'; if(f.age_days==null) return '—'; return f.age_days===0?'today':f.age_days+'d ago'; }
  async function load(){
    pop.innerHTML='<div class="psp-run">Loading…</div>';
    try{
      const r=await fetch('/api/pipeline-status'); const d=await r.json();
      label.textContent='Run '+(d.last_run?new Date(d.last_run).toLocaleDateString(undefined,{day:'2-digit',month:'short'}):'—');
      let html='<h4>Last pipeline run</h4><div class="psp-run">'+fmtRun(d.last_run)+'</div>'+
        '<h4>Input files</h4>';
      (d.files||[]).forEach(f=>{
        const cls=!f.present?'absent':(f.stale?'stale':'');
        html+='<div class="psp-row"><span class="psp-name">'+escapeHtml(f.label||'')+'</span>'+
          '<span class="psp-age '+cls+'">'+escapeHtml(ageTxt(f))+'</span></div>';
      });
      pop.innerHTML=html;
    }catch(e){ pop.innerHTML='<div class="psp-run">status unavailable</div>'; }
  }
  btn.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(pop.hidden){ pop.hidden=false; load(); } else { pop.hidden=true; }
  });
  document.addEventListener('click',(e)=>{ if(!pop.hidden && !pop.contains(e.target) && e.target!==btn) pop.hidden=true; });
  load();  // populate the button label on start (quietly)
}

let _sse=null;
function connectSSE(){
  let es;
  try{ es=new EventSource('/events'); }catch(e){ setStatus('bad'); return; }
  _sse=es;
  es.addEventListener('hello',()=>setStatus('ok'));
  es.addEventListener('refresh',async()=>{
    try{
      await loadAll();
      renderGrid(); updateMeta();
      setStatus('ok');
    }catch(e){ setStatus('bad'); }
    finally{
      const refreshBtn=document.getElementById('refreshBtn');
      refreshBtn.disabled=false;
      refreshBtn.querySelector('svg').classList.remove('spin');
    }
  });
  es.addEventListener('error',()=>{
    setStatus('bad');
    const refreshBtn=document.getElementById('refreshBtn');
    refreshBtn.disabled=false;
    refreshBtn.querySelector('svg').classList.remove('spin');
  });
  es.onerror=()=>{ setStatus('bad'); };
  es.onopen=()=>{ setStatus('ok'); };
}

/* ------------------ single-instance guard (user request 2026-07-18) ------------------ */
// Opening a new Investment Dashboard should close the old tabs left open in the
// browser. A page can't force-close a tab the USER opened (Chrome only lets a
// script close windows it opened itself), so: the newest tab broadcasts a claim,
// every older tab tries window.close() and — if the browser refuses — drops a
// full-screen "inactive, reopened elsewhere" cover and stops polling, so there's
// never confusion about which tab is live and the stale ones go quiet.
function singleInstanceGuard(){
  if(!('BroadcastChannel' in window)) return;
  const myTs=Date.now(), myRid=Math.random();
  let steppedDown=false;
  let ch;
  try{ ch=new BroadcastChannel('investment-dashboard'); }catch(e){ return; }
  function isOlderThan(m){ return m.ts>myTs || (m.ts===myTs && m.rid>myRid); }
  function stepDown(){
    if(steppedDown) return; steppedDown=true;
    try{ if(_sse) _sse.close(); }catch(_){}
    try{ window.close(); }catch(_){}            // works only if this tab was script-opened
    setTimeout(()=>{                             // still here → the browser refused; show a cover
      const cover=document.createElement('div');
      cover.style.cssText='position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;'
        +'align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px;'
        +'background:rgba(8,12,20,.94);color:#e7ecf5;font-family:system-ui,sans-serif';
      cover.innerHTML='<div style="font-size:20px;font-weight:700">Dashboard reopened in a new tab</div>'
        +'<div style="font-size:14px;color:#93a0b4;max-width:420px">This tab is now inactive. '
        +'You can close it — the live dashboard is in the newest tab.</div>'
        +'<button id="si-close" style="margin-top:6px;padding:9px 18px;border-radius:8px;border:none;'
        +'background:#1f7a33;color:#fff;font-weight:650;cursor:pointer">Close this tab</button>';
      document.body.appendChild(cover);
      const b=document.getElementById('si-close');
      if(b) b.addEventListener('click',()=>{ try{ window.close(); }catch(_){}});
    },120);
  }
  ch.onmessage=(e)=>{
    const m=e.data||{};
    if(m.type==='claim' && isOlderThan(m)){ stepDown(); }
  };
  ch.postMessage({type:'claim', ts:myTs, rid:myRid});   // tell existing tabs a newer one is here
}

/* ---------------------------- init ---------------------------- */
(async function init(){
  singleInstanceGuard();
  renderRail();
  renderTopbar();
  setStatus('pending');
  wireTopbarActions();
  try{
    await loadAll();
    setStatus('ok');
  }catch(e){
    console.error('initial data load failed', e);
    setStatus('bad');
  }
  renderTopbar();
  renderGrid();
  connectSSE();
})();
